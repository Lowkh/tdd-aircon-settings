name: TDD Aircon Settings CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      pytest_output: ${{ steps.pytest_output.outputs.pytest_output }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run pytest and capture output
        run: |
          set +e
          pytest 2>&1 | tee pytest.log
          exit_code=${PIPESTATUS[0]}
          echo "PYTEST_EXIT_CODE=$exit_code" >> "$GITHUB_ENV"
          exit 0

      - name: Extract pytest output
        id: pytest_output
        if: always()
        run: |
          snippet=$(tail -n 12 pytest.log | tr '\n' ' ' | sed 's/"/\\"/g')
          echo "pytest_output=$snippet" >> "$GITHUB_OUTPUT"

      - name: Fail job if pytest failed
        if: env.PYTEST_EXIT_CODE != '0'
        run: exit 1

  notify-discord:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}

    steps:
      - name: Send Discord notification
        uses: Bilfet/discord-webhook-message@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: GitHub Actions
          content: "Workflow result: ${{ needs.test.result }}"
          embed_title: "TDD Aircon Settings CI"
          embed_description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Pytest output:
            ${{ needs.test.outputs.pytest_output }}
          embed_color: FF5733
